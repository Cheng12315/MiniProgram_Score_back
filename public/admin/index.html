<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>积分管理后台</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 登录页（无侧边栏） -->
    <div id="login-page" class="page login-page">
      <div class="login-box">
        <h1>积分管理后台</h1>
        <form id="login-form">
          <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" required placeholder="请输入用户名">
          </div>
          <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required placeholder="请输入密码">
          </div>
          <div id="login-error" class="error-message"></div>
          <button type="submit" id="login-btn" class="btn btn-primary">登录</button>
        </form>
      </div>
    </div>

    <!-- 主布局（登录后显示） -->
    <div id="main-layout" class="main-layout hidden">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>管理后台</h2>
          <p class="user-info" id="sidebar-user"></p>
        </div>
        <nav class="sidebar-nav">
          <a href="#/dashboard" class="nav-item" data-route="dashboard">仪表板</a>
          <a href="#/teachers" class="nav-item" data-route="teachers">班主任管理</a>
          <a href="#/students" class="nav-item" data-route="students">学生管理</a>
          <a href="#/semesters" class="nav-item" data-route="semesters">学期管理</a>
          <a href="#/classes" class="nav-item" data-route="classes">班级管理</a>
          <a href="#/scores" class="nav-item" data-route="scores">积分数据</a>
          <a href="#/logs" class="nav-item" data-route="logs">操作日志</a>
        </nav>
        <div class="sidebar-footer">
          <button id="logout-btn" class="btn btn-outline">退出登录</button>
        </div>
      </aside>
      <main class="main-content">
        <div id="page-content"></div>
      </main>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
<a href="https://beian.miit.gov.cn/" target="_blank">京ICP备2026009864</a>
</html>
